          "outline-variant": "#424752", "surface-variant": "#353534",
          "surface-container": "#201f1f", "secondary": "#c6c6c7",
          "surface-container-highest": "#353534", "surface-dim": "#131313",
          "surface-elevated": "#1A1A1A", "border-low-contrast": "#262626",
          "on-surface": "#e5e2e1", "outline": "#8c919e"
        },
        borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
        spacing: { "section-gap": "120px", "gutter": "24px", "element-gap": "32px", "margin-desktop": "64px", "margin-mobile": "20px", "container-max": "1200px" },
        fontFamily: { "label-sm": ["JetBrains Mono"], "headline-lg": ["JetBrains Mono"], "headline-lg-mobile": ["JetBrains Mono"], "body-lg": ["Inter"], "label-md": ["JetBrains Mono"], "headline-md": ["JetBrains Mono"], "headline-sm": ["JetBrains Mono"], "body-md": ["Inter"] },
        fontSize: {
          "label-sm": ["12px", { "lineHeight": "1.4", "fontWeight": "400" }],
          "headline-lg-mobile": ["36px", { "lineHeight": "1.15", "letterSpacing": "-0.01em", "fontWeight": "600" }],
          "headline-lg": ["60px", { "lineHeight": "1.05", "letterSpacing": "-0.02em", "fontWeight": "600" }],
          "headline-sm": ["22px", { "lineHeight": "1.3", "fontWeight": "600" }],
          "body-lg": ["20px", { "lineHeight": "1.8", "fontWeight": "400" }],
          "label-md": ["15px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500" }],
          "headline-md": ["30px", { "lineHeight": "1.25", "fontWeight": "500" }],

<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  #particles-bg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
  .card-enter { opacity: 0; transform: translateY(24px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .card-enter.visible { opacity: 1; transform: translateY(0); }

<body class="bg-background text-on-surface font-body-md antialiased min-h-screen flex flex-col">
<div id="particles-bg"></div>

<!-- Nav -->
<nav class="sticky top-0 z-50 bg-background/80 backdrop-blur-sm border-b border-border-low-contrast">
  <div class="max-w-[1280px] mx-auto px-margin-mobile md:px-16 py-5 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2 text-text-muted hover:text-primary transition-colors duration-200 font-label-sm text-label-sm group">
      <span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform" style="font-size:18px;">arrow_back</span>
      <span data-i18n="nav_back">All projects</span>
    </a>
    <span class="font-label-md text-label-md text-on-surface uppercase tracking-widest">SANTIAGO MORALES</span>
    <div class="w-20"></div>
  </div>
</nav>

<main class="flex-grow">

  <!-- Header -->
  <section class="max-w-[1280px] mx-auto px-margin-mobile md:px-16 pt-20 pb-12 card-enter">
    <p class="font-label-md text-label-md text-text-muted tracking-widest uppercase mb-4" data-i18n="header_label">Brand · Identity</p>
    <h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface tracking-tight mb-6">Maindstar</h1>
    <p class="font-body-lg text-body-lg text-text-muted max-w-2xl" data-i18n="header_desc">
      Brand identity and digital product design work for Maindstar.
    </p>
  </section>

  <!-- Hero image -->
  <section class="max-w-[1280px] mx-auto px-margin-mobile md:px-16 pb-section-gap card-enter" style="transition-delay: 0.1s;">
    <div class="w-full aspect-[16/7] bg-surface-elevated border border-border-low-contrast rounded-sm flex items-center justify-center overflow-hidden">
      <img alt="Maindstar" class="max-h-full max-w-lg w-full object-contain p-16 opacity-90" src="maindstar/img/maindstarlogo1.svg"/>
    </div>
  </section>

</main>

<footer class="w-full py-gutter px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-element-gap border-t border-border-low-contrast bg-background font-label-sm text-label-sm opacity-80 hover:opacity-100 transition-opacity">
  <div class="font-label-md text-label-md uppercase tracking-widest text-on-surface">DavinSane</div>
  <div class="text-on-surface" data-i18n="footer_copy">© 2026 Santiago Morales - DavinSane. All rights reserved.</div>
  <nav class="flex gap-6">
    <a class="text-text-muted hover:text-primary transition-colors" href="#" data-i18n="footer_privacy">Privacy</a>
    <a class="text-text-muted hover:text-primary transition-colors" href="#">Github</a>
  </nav>
</footer>

<!-- Floating language toggle -->
<button id="lang-toggle" onclick="toggleLang()" aria-label="Toggle language" class="fixed bottom-6 right-6 z-50 flex items-center gap-2 px-3 py-2 bg-surface-elevated border border-border-low-contrast rounded-full font-label-sm text-label-sm text-on-surface hover:border-primary hover:text-primary transition-colors duration-200 shadow-lg">
  <span class="material-symbols-outlined" style="font-size:16px;">language</span>
  <span id="lang-label">ES</span>
</button>

<script type="module" src="particles-bg.js"></script>
<script>
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.card-enter').forEach(el => observer.observe(el));

  const translations = {
    en: {
      nav_back: 'All projects',
      header_label: 'Brand · Identity',
      header_desc: 'Brand identity and digital product design work for Maindstar.',
      footer_copy: '© 2026 Santiago Morales - DavinSane. All rights reserved.',
      footer_privacy: 'Privacy'
    },
    es: {
      nav_back: 'Todos los proyectos',
      header_label: 'Marca · Identidad',
      header_desc: 'Identidad de marca y diseño de producto digital para Maindstar.',
      footer_copy: '© 2026 Santiago Morales - DavinSane. Todos los derechos reservados.',
      footer_privacy: 'Privacidad'
    }
  };

  let currentLang = localStorage.getItem('lang') || 'en';

  function applyLang(lang) {
    const t = translations[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (t[key] !== undefined) el.textContent = t[key];
    });
    document.getElementById('lang-label').textContent = lang === 'en' ? 'ES' : 'EN';
    document.documentElement.lang = lang;
  }

  function toggleLang() {
    currentLang = currentLang === 'en' ? 'es' : 'en';
    localStorage.setItem('lang', currentLang);
    applyLang(currentLang);
  }

  applyLang(currentLang);
</script>
</body>
</html>
